services:
  ojs-db:
    image: mariadb:10.11
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - ./database:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=ojs_db
      - MYSQL_USER=ojs_user
      - MYSQL_PASSWORD=ojs_pass
    restart: unless-stopped

  ojs-app:
    build: .  # Membangun image dari Dockerfile di folder ini (OpenResty)
    ports:
      - "8080:80"
    depends_on:
      - ojs-db
    volumes:
      # WAF Lua Script — mount dari folder integrations di repo
      - ../../../../integrations/waf_checker.lua:/usr/local/openresty/nginx/conf/waf_checker.lua:ro
      # Mount data OJS
      - ./config.inc.php:/var/www/ojs/config.inc.php
      - ./public:/var/www/ojs/public
      - ./ojs_files:/var/www/ojs_files
    environment:
      - DB_HOST=ojs-db
      - DB_USER=ojs_user
      - DB_PASSWORD=ojs_pass
      - DB_NAME=ojs_db
      # Sidecar WAF agent — berjalan di host (0.0.0.0:9999)
      # host.docker.internal → IP gateway Docker → host machine
      - WAF_AGENT_HOST=host.docker.internal
      - WAF_AGENT_PORT=9999
    extra_hosts:
      # Mapping host.docker.internal ke gateway Docker (host machine)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
