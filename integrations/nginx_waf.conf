# ===========================================================================
# nginx_waf.conf — Konfigurasi OpenResty untuk ML-Based WAF (Bare Metal)
#
# Target: OJS di /var/www/ojs, URL http://10.34.100.110/
#
# Arsitektur (Non-Docker):
#   Client → OpenResty :80 (0.0.0.0:80, waf_checker.lua)
#                │ TCP :9999 (JSON)
#                ▼
#          sidecar_agent.py (127.0.0.1:9999)
#                │
#                ▼ jika PASS
#          Nginx OJS :8080 (127.0.0.1:8080) → PHP-FPM → OJS (/var/www/ojs)
#
# Catatan:
#   Nginx OJS yang semula di port 80 dipindahkan ke 127.0.0.1:8080.
#   OpenResty mengambil alih port 80 sebagai WAF front-end.
#   setup_baremetal.sh menangani proses pemindahan ini secara otomatis.
#
# Prasyarat:
#   - OpenResty terinstall (lihat setup_baremetal.sh)
#   - Nginx OJS sudah dipindahkan ke port 8080 (setup_baremetal.sh otomatis)
#   - sidecar_agent.py berjalan: python core/sidecar_agent.py --monitor
#   - waf_checker.lua tersalin ke /etc/openresty/waf_checker.lua
#
# Instalasi:
#   sudo bash integrations/setup_baremetal.sh
#   ATAU manual:
#   1. sudo cp integrations/nginx_waf.conf /etc/openresty/conf.d/ojs_waf.conf
#   2. sudo cp integrations/waf_checker.lua /etc/openresty/waf_checker.lua
#   3. sudo openresty -t && sudo systemctl reload openresty
# ===========================================================================

# Shared memory zones (opsional, untuk stats)
lua_shared_dict waf_stats 10m;

# Custom log format (harus di level http, bukan server)
log_format waf_log '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'waf_decision=$waf_decision '
                   'waf_score=$waf_score '
                   'waf_attack=$waf_attack '
                   'waf_id=$waf_request_id '
                   'rt=$request_time';

# Upstream: Nginx OJS (dipindahkan ke localhost:8080)
upstream ojs_backend {
    server 127.0.0.1:8080;          # Nginx OJS (bare metal, dipindah dari port 80)
    keepalive 16;
}

server {
    listen 80;
    server_name _;                  # Sesuaikan dengan hostname/IP jika perlu

    # ---- WAF Variables (untuk log) ----
    set $waf_decision   "-";
    set $waf_score      "0.00";
    set $waf_attack     "NONE";
    set $waf_request_id "-";

    access_log /var/log/openresty/waf_access.log waf_log;
    error_log  /var/log/openresty/waf_error.log warn;

    # ---- Body buffering ----
    client_max_body_size 10m;
    client_body_buffer_size 16k;

    # ---- WAF Check pada setiap request ----
    location / {
        # Fase access: jalankan WAF checker (kirim ke sidecar 127.0.0.1:9999)
        access_by_lua_file /etc/openresty/waf_checker.lua;

        # Jika PASS, teruskan ke Apache yang menjalankan OJS
        proxy_pass http://ojs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout ke upstream
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ---- Health check endpoint (bypassed oleh WAF) ----
    location = /health {
        access_log off;
        return 200 '{"status":"ok","mode":"waf-baremetal"}';
        add_header Content-Type application/json;
    }
}
