# ===========================================================================
# nginx_waf.conf — Konfigurasi Nginx/OpenResty untuk ML-Based WAF
#
# Arsitektur:
#   Client → Nginx (Lua waf_checker.lua) → UDS → Python Sidecar (ML)
#   Nginx membuat keputusan PASS / BLOCK (403) berdasarkan respons sidecar.
#
# Prasyarat:
#   - OpenResty atau Nginx + lua-nginx-module + lua-cjson
#   - sidecar_agent.py berjalan dan listening di /tmp/waf_agent.sock
#   - Docker OJS berjalan sebagai upstream
#
# Instalasi:
#   1. Salin file ini ke /etc/openresty/conf.d/waf.conf
#      atau include dari nginx.conf utama
#   2. Salin waf_checker.lua ke /etc/openresty/waf_checker.lua
#   3. Jalankan: sudo openresty -t && sudo systemctl reload openresty
# ===========================================================================

# Shared memory zones (opsional, untuk stats)
lua_shared_dict waf_stats 10m;

# Upstream: Docker OJS
upstream ojs_backend {
    server 127.0.0.1:8080;          # Sesuaikan port Docker OJS
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # ---- WAF Variables (untuk log) ----
    set $waf_decision   "-";
    set $waf_score      "0.00";
    set $waf_attack     "NONE";
    set $waf_request_id "-";

    # ---- Custom Log Format ----
    log_format waf_log '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'waf_decision=$waf_decision '
                       'waf_score=$waf_score '
                       'waf_attack=$waf_attack '
                       'waf_id=$waf_request_id '
                       'rt=$request_time';

    access_log /var/log/openresty/waf_access.log waf_log;
    error_log  /var/log/openresty/waf_error.log warn;

    # ---- Body buffering ----
    client_max_body_size 10m;
    client_body_buffer_size 16k;

    # ---- WAF Check pada setiap request ----
    location / {
        # Fase access: jalankan WAF checker
        access_by_lua_file /etc/openresty/waf_checker.lua;

        # Jika PASS, teruskan ke upstream OJS
        proxy_pass http://ojs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout ke upstream
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ---- Health check endpoint (bypassed oleh WAF) ----
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
